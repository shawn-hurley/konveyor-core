name: Release to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version $TAG confirmed."

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (grpc feature)
        run: cargo clippy --features grpc -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (grpc feature)
        run: cargo test --features grpc

      - name: Build release (default features)
        run: cargo build --release

      - name: Build release (grpc feature)
        run: cargo build --release --features grpc

  publish:
    name: Publish to crates.io
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  version-bump:
    name: Bump version for next development cycle
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@noreply.localhost"

      - name: Compute next patch version
        id: next
        run: |
          CURRENT="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          MAJOR="$(echo "$CURRENT" | cut -d. -f1)"
          MINOR="$(echo "$CURRENT" | cut -d. -f2)"
          PATCH="$(echo "$CURRENT" | cut -d. -f3)"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump Cargo.toml version
        run: |
          sed -i "s/^version *= *\"${{ steps.next.outputs.current }}\"/version = \"${{ steps.next.outputs.next }}\"/" Cargo.toml

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Create branch and commit
        run: |
          BRANCH="chore/bump-v${{ steps.next.outputs.next }}"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.next.outputs.next }}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-v${{ steps.next.outputs.next }}"
          BODY="Automated version bump after publishing v${{ steps.next.outputs.current }} to crates.io."
          # Forgejo API — compatible with Gitea
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"chore: bump version to ${{ steps.next.outputs.next }}\",\"body\":\"${BODY}\",\"head\":\"${BRANCH}\",\"base\":\"main\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/pulls"
